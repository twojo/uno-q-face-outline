<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wojo's Face Demo — Arduino Uno Q</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="header">
            <h1 class="title-text">Wojo's Face Demo</h1>
            <span class="status-badge" id="statusBadge">Loading...</span>
        </div>

        <div class="main-content">
            <div class="container" id="video-container">
                <div id="videoFeedContainer">
                    <div id="videoPlaceholder" class="camera-status">
                        <div class="spinner"></div>
                        <p class="feedback-text">Starting camera...</p>
                    </div>
                    <video id="webcamVideo" autoplay playsinline muted style="display:none;"></video>
                    <canvas id="overlayCanvas" style="display:none;"></canvas>
                </div>
            </div>

            <div class="right-column">
                <div class="container container-right">
                    <div class="controls-section">
                        <div class="control-group">
                            <div class="control-row">
                                <label for="drawModeSelect">Draw Mode</label>
                                <select id="drawModeSelect">
                                    <option value="mesh">Mesh</option>
                                    <option value="outline" selected>Outline</option>
                                    <option value="dots">Dots</option>
                                    <option value="iris">Iris Only</option>
                                    <option value="none">None</option>
                                </select>
                            </div>
                            <div class="control-confidence">
                                <label id="confidence-label" for="confidenceSlider">Confidence</label>
                                <button id="confidenceResetButton" class="btn-tertiary">
                                    <input type="number" id="confidenceInput" class="confidence-input" min="0" max="1" step="0.05" value="0.50">
                                    <img src="img/icon-reset.svg" alt="Reset" class="reset-icon" onerror="this.style.display='none'">
                                </button>
                            </div>
                            <div class="slider-box">
                                <span class="confidence-limits">0</span>
                                <div class="slider-container">
                                    <div class="slider-progress" id="sliderProgress"></div>
                                    <div class="confidence-value-display" id="confidenceValueDisplay">0.5</div>
                                    <input type="range" id="confidenceSlider" min="0" max="1" step="0.05" value="0.5">
                                </div>
                                <span class="confidence-limits">1</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="container container-right">
                    <div class="face-count-section">
                        <div class="face-count-display">
                            <span class="face-count-label">Tracking</span>
                            <span class="face-count-number" id="faceCountNumber">0</span>
                            <span class="face-count-separator">/</span>
                            <span class="face-count-max">2 max</span>
                        </div>
                    </div>
                </div>

                <div class="container container-right">
                    <div id="feedback-section" class="feedback-section">
                        <h2 class="section-title">Feedback</h2>
                        <div id="feedback-content" class="feedback-content">
                            <p class="feedback-text">System response will appear here</p>
                        </div>
                    </div>
                </div>

                <div class="container container-right">
                    <div class="recent-detections-section">
                        <div class="section-title-container">
                            <h2 class="section-title">Recent detections</h2>
                        </div>
                        <div id="recentDetections"></div>
                    </div>
                </div>

                <div class="container container-right">
                    <div class="hud-section">
                        <h2 class="section-title">HUD</h2>
                        <div id="hudContent" class="hud-content">
                            <div class="hud-row"><span>FPS</span><span id="hudFps">--</span></div>
                            <div class="hud-row"><span>Faces</span><span id="hudFaces">0</span></div>
                            <div class="hud-row"><span>Expression</span><span id="hudExpression">--</span></div>
                            <div class="hud-row"><span>Yaw</span><span id="hudYaw">--</span></div>
                            <div class="hud-row"><span>Pitch</span><span id="hudPitch">--</span></div>
                        </div>
                    </div>
                <div class="container container-right" id="modulinoSection" style="display:none;">
                    <div class="modulino-section">
                        <h2 class="section-title">Modulinos</h2>
                        <div id="modulinoModules" class="modulino-modules"></div>
                        <div id="modulinoControls" class="modulino-controls"></div>
                    </div>
                </div>
                </div>
            </div>
        </div>
        <div id="error-container" class="error-message" style="display: none;"></div>
    </div>

    <script src="libs/socket.io.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
