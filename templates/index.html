<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>AI Mirror Booth</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #00ffcc;
            --accent-dim: rgba(0,255,204,0.15);
            --bg: #0a0a0f;
            --card: #111118;
            --border: #222230;
            --text: #e8e8f0;
            --muted: #666680;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .booth {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
            font-weight: 300;
        }

        .mirror-frame {
            position: relative;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--border);
            background: #000;
            box-shadow: 0 0 60px rgba(0,255,204,0.05);
        }

        .mirror-frame video,
        .mirror-frame #meshCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #meshCanvas {
            z-index: 2;
            pointer-events: none;
            opacity: 0.8;
        }

        .hud-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 5;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-left: 3px solid var(--accent);
            backdrop-filter: blur(4px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .hud-overlay.visible { opacity: 1; }

        .hud-label {
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .hud-value {
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
        }

        .laser-line {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
            z-index: 10;
            display: none;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .countdown-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            z-index: 10;
        }

        .countdown-num {
            font-size: 140px;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 80px var(--accent), 0 0 40px var(--accent);
            animation: countPop 0.6s ease-out;
        }

        @keyframes countPop {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 11;
        }

        .flash-overlay.fire { animation: flash 0.3s ease-out; }

        @keyframes flash {
            0% { opacity: 0.9; }
            100% { opacity: 0; }
        }

        .results-panel {
            display: none;
            width: 100%;
            max-width: 480px;
        }

        .comparison {
            display: flex;
            gap: 8px;
        }

        .comp-card {
            flex: 1;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--border);
            position: relative;
        }

        .comp-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
        }

        .comp-card.ai-card {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0,255,204,0.15);
        }

        .reveal-anim .comp-card.ai-card {
            animation: revealSlide 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes revealSlide {
            0% { transform: translateX(40px) scale(0.9); opacity: 0; }
            100% { transform: translateX(0) scale(1); opacity: 1; }
        }

        .comp-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
        }

        .comp-label.ai { color: var(--accent); }

        .result-meta {
            margin-top: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 12px;
        }

        .meta-row {
            display: flex;
            gap: 10px;
            margin-bottom: 6px;
        }

        .meta-row:last-child { margin-bottom: 0; }

        .meta-label {
            color: var(--muted);
            min-width: 50px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .meta-val {
            color: var(--accent);
            word-break: break-word;
            font-weight: 300;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 480px;
        }

        .main-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 900;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .main-btn.capture {
            background: linear-gradient(135deg, var(--accent), #00cc99);
            color: #000;
            box-shadow: 0 4px 25px rgba(0,255,204,0.3);
        }

        .main-btn.capture:hover { box-shadow: 0 4px 35px rgba(0,255,204,0.5); transform: translateY(-1px); }
        .main-btn.capture:active { transform: scale(0.97); }

        .main-btn.again {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .main-btn.again:hover { border-color: var(--accent); }

        .main-btn:disabled {
            background: var(--card) !important;
            color: var(--muted) !important;
            box-shadow: none !important;
            cursor: not-allowed;
            border: 1px solid var(--border) !important;
        }

        .loading-bar {
            width: 100%;
            height: 3px;
            background: var(--card);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .loading-bar-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #7c3aed, var(--accent));
            background-size: 200% 100%;
            border-radius: 2px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .status-text {
            font-size: 14px;
            color: var(--muted);
            font-weight: 300;
            min-height: 20px;
            text-align: center;
        }

        .error-text {
            color: #ff5555;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .gallery {
            width: 100%;
            max-width: 600px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .gallery-title {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
        }

        .gallery-strip {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .gallery-thumb {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .gallery-thumb:hover { border-color: var(--accent); transform: scale(1.05); }
        .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .gallery-thumb .g-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(0,0,0,0.8);
            color: var(--accent);
            text-align: center;
            padding: 2px;
        }

        .fullscreen-view {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .fullscreen-view img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
            border: 2px solid var(--accent);
        }

        @media (max-width: 500px) {
            .header h1 { font-size: 22px; }
            .mirror-frame { max-width: 100%; border-radius: 16px; }
            .comp-card { border-radius: 12px; }
            .countdown-num { font-size: 100px; }
        }
    </style>
</head>
<body>
    <div class="booth">
        <div class="header">
            <h1>AI Mirror Booth</h1>
            <p>Identity-Preserving Smart Mirror</p>
        </div>

        <div class="mirror-frame" id="mirrorFrame">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="meshCanvas"></canvas>
            <div class="laser-line" id="laser"></div>

            <div class="hud-overlay" id="hudOverlay">
                <div class="hud-label">Identity Lock</div>
                <div id="confidence" class="hud-value">SCANNING...</div>
            </div>

            <div class="countdown-overlay" id="countdownOverlay">
                <div class="countdown-num" id="countdownNum">3</div>
            </div>
            <div class="flash-overlay" id="flashOverlay"></div>
        </div>

        <div class="results-panel" id="resultsPanel">
            <div class="comparison" id="comparison">
                <div class="comp-card">
                    <img id="capturedImg" alt="Your photo" />
                    <span class="comp-label">You</span>
                </div>
                <div class="comp-card ai-card">
                    <img id="resultImg" alt="AI result" />
                    <span class="comp-label ai">AI</span>
                </div>
            </div>
            <div class="result-meta">
                <div class="meta-row">
                    <span class="meta-label">Theme</span>
                    <span class="meta-val" id="metaTheme">--</span>
                </div>
                <div class="meta-row">
                    <span class="meta-label">Seed</span>
                    <span class="meta-val" id="metaSeed">--</span>
                </div>
                <div class="meta-row">
                    <span class="meta-label">Prompt</span>
                    <span class="meta-val" id="metaPrompt">--</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="main-btn capture" id="actionBtn" disabled>&#x1F3B2; Roll the AI Dice!</button>
            <div class="loading-bar" id="loadingBar">
                <div class="loading-bar-inner" id="loadingBarInner"></div>
            </div>
            <div class="status-text" id="statusText"></div>
            <div class="error-text" id="errorText"></div>
        </div>

        <div class="gallery" id="gallery" style="display:none;">
            <div class="gallery-title">Your Transformations</div>
            <div class="gallery-strip" id="galleryStrip"></div>
        </div>
    </div>

    <div class="fullscreen-view" id="fullscreenView">
        <img id="fullscreenImg" alt="Full view" />
    </div>

<script type="module">
    import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById("webcam");
    const meshCanvas = document.getElementById("meshCanvas");
    const meshCtx = meshCanvas.getContext("2d");
    const confidenceLabel = document.getElementById("confidence");
    const hudOverlay = document.getElementById("hudOverlay");
    const actionBtn = document.getElementById("actionBtn");
    const laser = document.getElementById("laser");
    const capturedImg = document.getElementById("capturedImg");
    const resultImg = document.getElementById("resultImg");
    const mirrorFrame = document.getElementById("mirrorFrame");
    const resultsPanel = document.getElementById("resultsPanel");
    const countdownOverlay = document.getElementById("countdownOverlay");
    const countdownNum = document.getElementById("countdownNum");
    const flashOverlay = document.getElementById("flashOverlay");
    const loadingBar = document.getElementById("loadingBar");
    const loadingBarInner = document.getElementById("loadingBarInner");
    const statusText = document.getElementById("statusText");
    const errorText = document.getElementById("errorText");
    const comparison = document.getElementById("comparison");
    const metaTheme = document.getElementById("metaTheme");
    const metaSeed = document.getElementById("metaSeed");
    const metaPrompt = document.getElementById("metaPrompt");
    const gallery = document.getElementById("gallery");
    const galleryStrip = document.getElementById("galleryStrip");
    const fullscreenView = document.getElementById("fullscreenView");
    const fullscreenImg = document.getElementById("fullscreenImg");

    let faceLandmarker = null;
    let drawingUtils = null;
    let meshLoopRunning = false;
    let meshPaused = false;
    let isProcessing = false;
    let isShowingResult = false;
    let loadingInterval = null;
    let historyArr = [];

    const loadingMsgs = [
        "Extracting facial geometry...",
        "Mapping identity vectors...",
        "Synthesizing neural portrait...",
        "Calibrating identity transfer...",
        "Reconstructing likeness matrix...",
        "Rendering photorealistic output...",
        "Finalizing identity fusion...",
    ];

    let meshAvailable = false;

    async function initFaceMesh() {
        try {
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );

            let options = {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                outputFaceBlendshapes: false,
                runningMode: "VIDEO",
                numFaces: 1
            };

            try {
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, options);
            } catch (gpuErr) {
                console.warn("GPU delegate failed, falling back to CPU:", gpuErr);
                options.baseOptions.delegate = "CPU";
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, options);
            }

            drawingUtils = new DrawingUtils(meshCtx);
            meshAvailable = true;
            console.log("FaceLandmarker ready");
        } catch (err) {
            console.error("MediaPipe init failed:", err);
            meshAvailable = false;
            confidenceLabel.innerText = "OFFLINE";
            hudOverlay.classList.add("visible");
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 720 }, height: { ideal: 720 } },
                audio: false
            });
            video.srcObject = stream;
            await new Promise((resolve) => {
                video.onloadeddata = resolve;
            });
            actionBtn.disabled = false;
            if (meshAvailable) startMeshLoop();
        } catch (e) {
            errorText.innerText = "Camera access required. Allow camera and reload.";
            errorText.style.display = "block";
        }
    }

    function startMeshLoop() {
        if (meshLoopRunning) return;
        meshLoopRunning = true;
        requestAnimationFrame(predictWebcam);
    }

    function predictWebcam() {
        if (!meshLoopRunning) return;

        if (meshPaused) {
            setTimeout(() => requestAnimationFrame(predictWebcam), 200);
            return;
        }

        if (!faceLandmarker || !drawingUtils || video.paused || video.ended || video.videoWidth === 0) {
            setTimeout(() => requestAnimationFrame(predictWebcam), 100);
            return;
        }

        meshCanvas.width = video.videoWidth;
        meshCanvas.height = video.videoHeight;

        let results;
        try {
            results = faceLandmarker.detectForVideo(video, performance.now());
        } catch (e) {
            requestAnimationFrame(predictWebcam);
            return;
        }

        meshCtx.clearRect(0, 0, meshCanvas.width, meshCanvas.height);

        if (results && results.faceLandmarks && results.faceLandmarks.length > 0) {
            for (const landmarks of results.faceLandmarks) {
                drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_TESSELATION,
                    { color: "#00ffcc44", lineWidth: 1 });
                drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE,
                    { color: "#00ffcc" });
                drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE,
                    { color: "#00ffcc" });
                drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_IRIS,
                    { color: "#00ffcc", lineWidth: 2 });
                drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_IRIS,
                    { color: "#00ffcc", lineWidth: 2 });
            }

            confidenceLabel.innerText = (96.4 + Math.random() * 3.4).toFixed(1) + "%";
            hudOverlay.classList.add("visible");
        } else {
            confidenceLabel.innerText = "NO FACE";
            hudOverlay.classList.remove("visible");
        }

        requestAnimationFrame(predictWebcam);
    }

    function countdown() {
        return new Promise(resolve => {
            countdownOverlay.style.display = "flex";
            let count = 3;
            countdownNum.textContent = count;

            const tick = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNum.textContent = count;
                    countdownNum.style.animation = "none";
                    void countdownNum.offsetWidth;
                    countdownNum.style.animation = "countPop 0.6s ease-out";
                } else {
                    clearInterval(tick);
                    countdownOverlay.style.display = "none";
                    flashOverlay.classList.remove("fire");
                    void flashOverlay.offsetWidth;
                    flashOverlay.classList.add("fire");
                    resolve();
                }
            }, 1000);
        });
    }

    function captureFrame() {
        const offscreen = document.createElement("canvas");
        offscreen.width = video.videoWidth || 640;
        offscreen.height = video.videoHeight || 480;
        const ctx = offscreen.getContext("2d");
        ctx.translate(offscreen.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        return offscreen.toDataURL("image/jpeg", 0.85);
    }

    function runLaserScan() {
        return new Promise(resolve => {
            let resolved = false;
            function finish() {
                if (resolved) return;
                resolved = true;
                laser.removeEventListener("animationend", finish);
                laser.style.display = "none";
                laser.style.animation = "none";
                resolve();
            }

            laser.style.display = "block";
            laser.style.animation = "none";
            void laser.offsetWidth;
            laser.style.animation = "scanMove 1.5s ease-in-out";
            laser.addEventListener("animationend", finish);
            setTimeout(finish, 2000);
        });
    }

    function startLoading() {
        loadingBar.style.display = "block";
        loadingBarInner.style.transition = "none";
        loadingBarInner.style.width = "0%";
        void loadingBarInner.offsetWidth;
        loadingBarInner.style.transition = "width 60s linear";
        loadingBarInner.style.width = "100%";

        let elapsed = 0;
        let msgIdx = Math.floor(Math.random() * loadingMsgs.length);
        statusText.textContent = loadingMsgs[msgIdx];

        loadingInterval = setInterval(() => {
            elapsed++;
            if (elapsed % 5 === 0) msgIdx = (msgIdx + 1) % loadingMsgs.length;
            statusText.textContent = loadingMsgs[msgIdx] + ` (${elapsed}s)`;
        }, 1000);
    }

    function stopLoading() {
        if (loadingInterval) {
            clearInterval(loadingInterval);
            loadingInterval = null;
        }
        loadingBar.style.display = "none";
        loadingBarInner.style.transition = "none";
        loadingBarInner.style.width = "0%";
        statusText.textContent = "";
    }

    function addToGallery(aiSrc, theme) {
        historyArr.unshift({ ai: aiSrc, theme });
        if (historyArr.length > 20) historyArr.pop();

        gallery.style.display = "block";
        galleryStrip.innerHTML = "";
        historyArr.forEach((item, i) => {
            const thumb = document.createElement("div");
            thumb.className = "gallery-thumb";
            const img = document.createElement("img");
            img.src = item.ai;
            img.alt = "Transform " + (i + 1);
            const label = document.createElement("div");
            label.className = "g-label";
            label.textContent = item.theme;
            thumb.appendChild(img);
            thumb.appendChild(label);
            thumb.onclick = () => {
                fullscreenImg.src = item.ai;
                fullscreenView.style.display = "flex";
            };
            galleryStrip.appendChild(thumb);
        });
    }

    fullscreenView.onclick = () => { fullscreenView.style.display = "none"; };

    actionBtn.addEventListener("click", async () => {
        if (isShowingResult) {
            resultsPanel.style.display = "none";
            mirrorFrame.style.display = "block";
            meshPaused = false;
            actionBtn.textContent = "\u{1F3B2} Roll the AI Dice!";
            actionBtn.className = "main-btn capture";
            errorText.style.display = "none";
            isShowingResult = false;
            return;
        }

        if (isProcessing) return;
        isProcessing = true;
        actionBtn.disabled = true;
        errorText.style.display = "none";

        await countdown();

        const imageData = captureFrame();
        capturedImg.src = imageData;

        meshPaused = true;
        meshCtx.clearRect(0, 0, meshCanvas.width, meshCanvas.height);
        hudOverlay.classList.remove("visible");

        statusText.textContent = "Extrapolating facial data...";
        await runLaserScan();

        mirrorFrame.style.display = "none";
        resultsPanel.style.display = "block";
        resultImg.src = "";
        comparison.classList.remove("reveal-anim");

        startLoading();

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 120000);

            const response = await fetch("/transform", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: imageData }),
                signal: controller.signal,
            });
            clearTimeout(timeout);

            let data;
            const text = await response.text();
            try {
                data = JSON.parse(text);
            } catch (parseErr) {
                throw new Error("Server returned an invalid response. Please try again.");
            }

            if (data.success) {
                stopLoading();
                resultImg.src = data.image;
                comparison.classList.add("reveal-anim");
                metaTheme.textContent = data.theme || "--";
                metaSeed.textContent = data.seed != null ? data.seed : "--";
                metaPrompt.textContent = data.prompt || "--";
                actionBtn.textContent = "\u{1F3B2} Roll Again!";
                actionBtn.className = "main-btn again";
                isShowingResult = true;
                addToGallery(data.image, data.theme || "Mystery");
            } else {
                throw new Error(data.error || "Generation failed.");
            }
        } catch (err) {
            stopLoading();
            resultsPanel.style.display = "none";
            mirrorFrame.style.display = "block";
            meshPaused = false;
            errorText.textContent = err.name === "AbortError"
                ? "Timed out. Try again."
                : err.message;
            errorText.style.display = "block";
        } finally {
            isProcessing = false;
            actionBtn.disabled = false;
        }
    });

    await initFaceMesh();
    await startCamera();
</script>
</body>
</html>
