<!--
  Smart Mirror AI Photo Booth — UI Template
  Follows the Arduino Bricks HTML structure from the reference app
  (mobile-video-generic-object-detection):

    • <body data-*> attributes carry state; CSS shows/hides elements based on them
    • Socket.IO loaded from static/libs/ — bundled for offline Uno Q use
    • A single <script src="/static/script.js"> at the bottom
    • No inline JS or CSS

  On the real Bricks SDK the WebUI serves a widget's render() output.
  This file maps 1-to-1 with that: the <body> becomes the widget root,
  the same socket.io.min.js is served by the real WebUI, and script.js
  calls socket.emit / socket.on using the same events as app.py.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Smart Mirror</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<!--
  data-state:
    "idle"       live camera feed, Capture button active
    "processing" loading overlay visible, button disabled
    "result"     AI result image visible
    "error"      error overlay visible

  data-connection:
    "disconnected"   (default) Socket.IO not yet connected
    "connected"      server acknowledged with "welcome" event
-->
<body data-state="idle" data-connection="disconnected">

  <div class="sm-app">

    <!-- ── Header — mirrors reference .header ──────────────────── -->
    <div class="sm-header">
      <h1 class="sm-title">Smart Mirror</h1>
      <p class="sm-subtitle">Arduino Uno Q · AI Photo Booth</p>
    </div>

    <!-- ── Status bar — mirrors reference .subheader ───────────── -->
    <div class="sm-subheader">
      <span class="sm-status-dot" id="sm-status-dot"></span>
      <span class="sm-status-text" id="sm-status-text">Connecting to server…</span>
    </div>

    <!-- ── Main content ─────────────────────────────────────────── -->
    <div class="sm-main">

      <!-- Camera / result viewport — mirrors reference #video-container -->
      <div class="sm-viewport" id="sm-viewport">

        <!-- Live camera feed (CSS mirror-flipped) -->
        <video id="sm-video" autoplay playsinline muted></video>

        <!-- Canvas used only for frame capture — never displayed -->
        <canvas id="sm-canvas" aria-hidden="true"></canvas>

        <!-- Loading overlay — visible while data-state="processing" -->
        <div class="sm-overlay sm-overlay--loading" id="sm-overlay-loading" aria-live="polite">
          <div class="sm-spinner"></div>
          <p class="sm-overlay-label">Transforming<span class="sm-dots"></span></p>
          <p class="sm-prompt-preview" id="sm-prompt-preview"></p>
        </div>

        <!-- Result overlay — visible while data-state="result" -->
        <div class="sm-overlay sm-overlay--result" id="sm-overlay-result">
          <img id="sm-result-img" src="" alt="AI-transformed photo" />
          <div class="sm-prompt-badge" id="sm-prompt-badge"></div>
        </div>

        <!-- Error overlay — visible while data-state="error" -->
        <div class="sm-overlay sm-overlay--error" id="sm-overlay-error">
          <span class="sm-error-icon">⚠</span>
          <p class="sm-error-msg" id="sm-error-msg">Something went wrong.</p>
          <button class="sm-btn sm-btn--retry" id="sm-retry-btn">Try Again</button>
        </div>

      </div><!-- /.sm-viewport -->

      <!-- ── Right column — mirrors reference .right-column ──── -->
      <div class="sm-controls">

        <!-- Capture button — mirrors reference's primary action -->
        <button class="sm-btn sm-btn--capture" id="sm-capture-btn" disabled>
          ◎ Capture &amp; Transform
        </button>

        <!-- Feedback section — mirrors reference #feedback-section -->
        <div class="sm-feedback-section" id="sm-feedback-section">
          <h2 class="sm-section-title">Last prompt</h2>
          <div class="sm-feedback-content" id="sm-feedback-content">
            <p class="sm-feedback-prompt" id="sm-feedback-prompt">
              Tap Capture to start
            </p>
          </div>
        </div>

        <!-- New photo button — shown only in result state -->
        <button class="sm-btn sm-btn--secondary" id="sm-new-btn">
          ↺ New Photo
        </button>

      </div><!-- /.sm-controls -->

    </div><!-- /.sm-main -->

  </div><!-- /.sm-app -->

  <!--
    socket.io.min.js is bundled locally so the app works offline
    on the Uno Q without an internet connection.
    The real Bricks WebUI serves this same file from its own assets.
  -->
  <script src="/static/libs/socket.io.min.js"></script>
  <script src="/static/script.js"></script>

</body>
</html>
