<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Smart Mirror Booth</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        /* Live camera view */
        .camera-wrap {
            width: 100%;
            max-width: 560px;
        }

        video {
            width: 100%;
            border-radius: 16px;
            transform: scaleX(-1);
            border: 2px solid #333;
            display: block;
        }

        /* Side-by-side result view */
        .results-wrap {
            display: none;
            width: 100%;
            max-width: 760px;
            gap: 12px;
            flex-direction: row;
        }

        .result-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .panel-label {
            font-size: 13px;
            color: #888;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .result-panel img {
            width: 100%;
            border-radius: 14px;
            display: block;
        }

        #capturedImg { border: 2px solid #444; }
        #resultImg   { border: 2px solid #00ffcc; }

        /* Controls */
        .btn-container {
            text-align: center;
            margin-top: 18px;
            width: 100%;
            max-width: 760px;
        }

        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,255,204,0.4);
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active  { transform: scale(0.95); }

        button:disabled {
            background: #555;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        #statusText {
            margin-top: 14px;
            font-size: 15px;
            color: #aaa;
            min-height: 20px;
            padding: 0 1rem;
            line-height: 1.5;
        }

        #errorOverlay {
            color: #ff4444;
            font-weight: bold;
            display: none;
            margin-top: 10px;
            padding: 0 1rem;
        }

        #modeBadge {
            display: inline-block;
            margin-top: 8px;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 20px;
            background: #1a1a1a;
            color: #666;
            letter-spacing: 0.04em;
        }
        #modeBadge.img2img { background: #0a2a20; color: #00ffcc; }

        #progressWrap {
            width: 100%;
            max-width: 760px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 14px;
            overflow: hidden;
            display: none;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffcc, #7c3aed);
            border-radius: 2px;
            transition: width 30s linear;
        }
    </style>
</head>
<body>

    <div class="camera-wrap" id="cameraWrap">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="results-wrap" id="resultsWrap">
        <div class="result-panel">
            <span class="panel-label">You</span>
            <img id="capturedImg" alt="Captured photo" />
        </div>
        <div class="result-panel">
            <span class="panel-label">AI Vision</span>
            <img id="resultImg" alt="AI result" />
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div class="btn-container">
        <button id="actionBtn">&#9711; Capture</button>
        <div id="progressWrap"><div id="progressBar"></div></div>
        <div id="statusText"></div>
        <div id="modeBadge" style="display:none;"></div>
        <div id="errorOverlay"></div>
    </div>

    <script>
        const video        = document.getElementById('video');
        const canvas       = document.getElementById('canvas');
        const actionBtn    = document.getElementById('actionBtn');
        const capturedImg  = document.getElementById('capturedImg');
        const resultImg    = document.getElementById('resultImg');
        const statusText   = document.getElementById('statusText');
        const errorOverlay = document.getElementById('errorOverlay');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar  = document.getElementById('progressBar');
        const cameraWrap   = document.getElementById('cameraWrap');
        const resultsWrap  = document.getElementById('resultsWrap');
        const modeBadge    = document.getElementById('modeBadge');

        let isDisplayingResult = false;
        let elapsedInterval    = null;
        let elapsedSeconds     = 0;

        // ── Camera init ────────────────────────────────────────────────
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(() => {
                errorOverlay.innerText = "Camera access required. Allow camera in your browser and reload.";
                errorOverlay.style.display = 'block';
            });

        // ── Progress helpers ───────────────────────────────────────────
        function startProgress() {
            elapsedSeconds = 0;
            progressWrap.style.display = 'block';
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            void progressBar.offsetWidth;
            progressBar.style.transition = 'width 30s linear';
            progressBar.style.width = '100%';

            clearInterval(elapsedInterval);
            elapsedInterval = setInterval(() => {
                elapsedSeconds++;
                statusText.innerText = `Generating\u2026 ${elapsedSeconds}s`;
            }, 1000);
        }

        function stopProgress() {
            clearInterval(elapsedInterval);
            progressWrap.style.display = 'none';
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
        }

        // ── Capture & generate ─────────────────────────────────────────
        actionBtn.addEventListener('click', async () => {

            if (isDisplayingResult) {
                resultsWrap.style.display = 'none';
                cameraWrap.style.display  = 'block';
                actionBtn.innerText = '\u25CE Capture';
                statusText.innerText = '';
                errorOverlay.style.display = 'none';
                modeBadge.style.display = 'none';
                isDisplayingResult = false;
                return;
            }

            actionBtn.disabled = true;
            errorOverlay.style.display = 'none';
            statusText.innerText = 'Generating\u2026 0s';
            startProgress();

            // Freeze current frame as "your photo" (un-mirror for natural orientation)
            const ctx = canvas.getContext('2d');
            canvas.width  = video.videoWidth  || 640;
            canvas.height = video.videoHeight || 480;
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            capturedImg.src = canvas.toDataURL('image/jpeg', 0.8);

            // Switch layout: hide camera, show side-by-side
            cameraWrap.style.display  = 'none';
            resultsWrap.style.display = 'flex';

            try {
                const controller = new AbortController();
                const timeoutId  = setTimeout(() => controller.abort(), 120000);

                const response = await fetch('/transform', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: capturedImg.src }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const data = await response.json();

                if (data.success) {
                    stopProgress();
                    resultImg.src = data.image;
                    statusText.innerText = `"${data.prompt}"`;
                    actionBtn.innerText = '\u21BA Try Again';
                    modeBadge.style.display = 'inline-block';
                    if (data.mode === 'img2img') {
                        modeBadge.className = 'img2img';
                        modeBadge.innerText = '✦ img2img — face preserved';
                    } else {
                        modeBadge.className = '';
                        modeBadge.innerText = 'text-to-image mode — add FAL_KEY for face preservation';
                    }
                    isDisplayingResult = true;
                } else {
                    throw new Error(data.error || 'Generation failed.');
                }

            } catch (err) {
                stopProgress();
                cameraWrap.style.display  = 'block';
                resultsWrap.style.display = 'none';
                errorOverlay.innerText = err.name === 'AbortError'
                    ? 'Request timed out — the model may be loading, try again.'
                    : err.message;
                errorOverlay.style.display = 'block';
                statusText.innerText = '';
            } finally {
                actionBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
