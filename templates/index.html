<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Smart Mirror Booth</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        /* scaleX(-1) = true mirror effect */
        video {
            width: 100%;
            border-radius: 16px;
            transform: scaleX(-1);
            border: 2px solid #333;
            display: block;
        }

        #resultImg {
            width: 100%;
            border-radius: 16px;
            display: none;
            border: 2px solid #00ffcc;
        }

        .btn-container {
            text-align: center;
            margin-top: 20px;
            width: 100%;
            max-width: 600px;
        }

        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.95); }

        button:disabled {
            background: #555;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }

        #statusText {
            margin-top: 15px;
            font-size: 15px;
            color: #aaa;
            min-height: 20px;
            padding: 0 1rem;
            line-height: 1.5;
        }

        #errorOverlay {
            color: #ff4444;
            font-weight: bold;
            display: none;
            margin-top: 10px;
            padding: 0 1rem;
        }

        /* Loading bar shown while waiting for the AI */
        #progressWrap {
            width: 100%;
            max-width: 600px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 14px;
            overflow: hidden;
            display: none;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffcc, #7c3aed);
            border-radius: 2px;
            transition: width 90s linear;
        }
    </style>
</head>
<body>

    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <img id="resultImg" alt="AI result" />
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="btn-container">
        <button id="actionBtn">&#9711; Capture</button>
        <div id="progressWrap"><div id="progressBar"></div></div>
        <div id="statusText"></div>
        <div id="errorOverlay"></div>
    </div>

    <script>
        const video       = document.getElementById('video');
        const canvas      = document.getElementById('canvas');
        const actionBtn   = document.getElementById('actionBtn');
        const resultImg   = document.getElementById('resultImg');
        const statusText  = document.getElementById('statusText');
        const errorOverlay = document.getElementById('errorOverlay');
        const progressWrap = document.getElementById('progressWrap');
        const progressBar  = document.getElementById('progressBar');

        let isDisplayingResult = false;
        let elapsedInterval = null;
        let elapsedSeconds = 0;

        // ── Camera init ────────────────────────────────────────────────
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(() => {
                errorOverlay.innerText = "Camera access required. Allow camera in your browser and reload.";
                errorOverlay.style.display = 'block';
            });

        // ── Progress helpers ───────────────────────────────────────────
        function startProgress() {
            elapsedSeconds = 0;
            progressWrap.style.display = 'block';
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            void progressBar.offsetWidth;
            progressBar.style.transition = 'width 90s linear';
            progressBar.style.width = '100%';

            clearInterval(elapsedInterval);
            elapsedInterval = setInterval(() => {
                elapsedSeconds++;
                statusText.innerText = `Transforming… ${elapsedSeconds}s`;
            }, 1000);
        }

        function stopProgress() {
            clearInterval(elapsedInterval);
            progressWrap.style.display = 'none';
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
        }

        // ── Capture & transform ────────────────────────────────────────
        actionBtn.addEventListener('click', async () => {

            // "Try Again" — return to live mirror
            if (isDisplayingResult) {
                resultImg.style.display = 'none';
                video.style.display = 'block';
                actionBtn.innerText = '\u25CE Capture';
                statusText.innerText = '';
                errorOverlay.style.display = 'none';
                isDisplayingResult = false;
                return;
            }

            // Capture state
            actionBtn.disabled = true;
            errorOverlay.style.display = 'none';
            statusText.innerText = 'Transforming\u2026 0s';
            startProgress();

            // Draw frame to canvas, un-mirror so the AI gets natural orientation
            const ctx = canvas.getContext('2d');
            canvas.width  = video.videoWidth  || 640;
            canvas.height = video.videoHeight || 480;
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);

            const imageB64 = canvas.toDataURL('image/jpeg', 0.8);

            try {
                const controller = new AbortController();
                const timeoutId  = setTimeout(() => controller.abort(), 120000);

                const response = await fetch('/transform', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageB64 }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const data = await response.json();

                if (data.success) {
                    stopProgress();
                    video.style.display = 'none';
                    resultImg.src = data.image;
                    resultImg.style.display = 'block';
                    statusText.innerText = `"${data.prompt}"`;
                    actionBtn.innerText = '\u21BA Try Again';
                    isDisplayingResult = true;
                } else {
                    throw new Error(data.error || 'Generation failed.');
                }

            } catch (err) {
                stopProgress();
                errorOverlay.innerText = err.name === 'AbortError'
                    ? 'Request timed out — the model may be loading, try again.'
                    : err.message;
                errorOverlay.style.display = 'block';
                statusText.innerText = '';
            } finally {
                actionBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
