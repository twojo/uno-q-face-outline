<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Smart Mirror AI Booth</title>
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --surface:   #0f1923;
      --border:    #1e2d3d;
      --accent:    #00d4ff;
      --accent2:   #7c3aed;
      --text:      #e0eaf4;
      --muted:     #4a6478;
      --danger:    #f85149;
      --success:   #3fb950;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Layout ───────────────────────────────────── */
    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 1rem;
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      text-align: center;
      line-height: 1.2;
    }

    .header h1 {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.25rem;
      letter-spacing: 0.04em;
    }

    /* ── Mirror Frame ─────────────────────────────── */
    .mirror-frame {
      position: relative;
      width: min(380px, 90vw);
      aspect-ratio: 3 / 4;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px var(--accent)22,
        0 0 40px var(--accent)18,
        inset 0 0 20px #00000060;
      background: #000;
      flex-shrink: 0;
    }

    /* Animated corner accents */
    .mirror-frame::before,
    .mirror-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      pointer-events: none;
      z-index: 10;
    }

    .mirror-frame::before {
      border: 2px solid transparent;
      background: linear-gradient(var(--bg), var(--bg)) padding-box,
                  linear-gradient(135deg, var(--accent)80, transparent 40%, transparent 60%, var(--accent2)80) border-box;
    }

    #video, #result-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #video {
      transform: scaleX(-1); /* mirror flip */
    }

    #result-img {
      display: none;
    }

    /* ── Overlay states ───────────────────────────── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      z-index: 20;
      border-radius: var(--radius);
      background: rgba(8, 12, 16, 0.88);
      backdrop-filter: blur(4px);
      transition: opacity 0.3s;
    }

    .overlay.hidden { display: none; }

    /* Loading spinner */
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .overlay-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-align: center;
      padding: 0 1rem;
    }

    .overlay-sub {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      padding: 0 1.5rem;
      line-height: 1.5;
    }

    /* Camera permission error */
    .cam-error {
      font-size: 0.8rem;
      color: var(--danger);
      text-align: center;
      padding: 0 1.5rem;
      line-height: 1.6;
    }

    /* Prompt badge on result */
    .prompt-badge {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(8,12,16,0.95));
      padding: 1.5rem 1rem 0.75rem;
      font-size: 0.72rem;
      color: #aac8e0;
      line-height: 1.5;
      z-index: 15;
      display: none;
    }

    .prompt-badge span {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Controls ─────────────────────────────────── */
    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s;
      letter-spacing: 0.04em;
    }

    button:active:not(:disabled) { transform: scale(0.95); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-capture {
      background: linear-gradient(135deg, var(--accent), #0099cc);
      color: #000;
      padding: 0.75rem 2.25rem;
      font-size: 1rem;
      box-shadow: 0 0 20px var(--accent)44;
    }

    #btn-capture:hover:not(:disabled) {
      box-shadow: 0 0 32px var(--accent)77;
    }

    #btn-reset {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: none;
    }

    #btn-reset:hover { background: var(--border); }

    /* ── Status bar ───────────────────────────────── */
    .status-bar {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      min-height: 1rem;
    }

    .status-bar .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Hidden canvas ────────────────────────────── */
    canvas { display: none; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>⬡ Smart Mirror AI Booth</h1>
    <p>Arduino Uno Q · Prototype on Replit</p>
  </div>

  <!-- Mirror frame -->
  <div class="mirror-frame">

    <video id="video" autoplay playsinline muted></video>
    <img id="result-img" alt="AI-transformed photo" />

    <!-- Loading overlay -->
    <div class="overlay hidden" id="overlay-loading">
      <div class="spinner"></div>
      <div class="overlay-title">Transforming…</div>
      <div class="overlay-sub" id="loading-prompt"></div>
    </div>

    <!-- Camera error overlay -->
    <div class="overlay hidden" id="overlay-error">
      <div style="font-size:2rem">📷</div>
      <div class="cam-error" id="error-msg">
        Camera access is required.<br/>Please allow camera permissions and reload.
      </div>
    </div>

    <!-- Prompt badge on result -->
    <div class="prompt-badge" id="prompt-badge">
      <span>Prompt:</span> <span id="prompt-text"></span>
    </div>

  </div>

  <!-- Buttons -->
  <div class="controls">
    <button id="btn-capture" disabled>Capture</button>
    <button id="btn-reset">↺ Reset</button>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar">Starting camera…</div>

</div>

<!-- Hidden canvas for frame grab -->
<canvas id="canvas"></canvas>

<script>
  /* ── Element refs ── */
  const video        = document.getElementById("video");
  const resultImg    = document.getElementById("result-img");
  const canvas       = document.getElementById("canvas");
  const btnCapture   = document.getElementById("btn-capture");
  const btnReset     = document.getElementById("btn-reset");
  const overlayLoad  = document.getElementById("overlay-loading");
  const overlayErr   = document.getElementById("overlay-error");
  const loadPrompt   = document.getElementById("loading-prompt");
  const promptBadge  = document.getElementById("prompt-badge");
  const promptText   = document.getElementById("prompt-text");
  const statusBar    = document.getElementById("status-bar");
  const errorMsg     = document.getElementById("error-msg");

  /* ── State helpers ── */
  function setStatus(msg, live = true) {
    statusBar.innerHTML = live
      ? `<span class="dot"></span>${msg}`
      : msg;
  }

  function showOverlay(el) {
    [overlayLoad, overlayErr].forEach(o => o.classList.add("hidden"));
    if (el) el.classList.remove("hidden");
  }

  /* ── Camera init ── */
  async function startCamera() {
    try {
      const constraints = {
        video: {
          facingMode: "user",
          width:  { ideal: 640 },
          height: { ideal: 853 },
        },
        audio: false,
      };

      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;

      video.onloadedmetadata = () => {
        video.play();
        btnCapture.disabled = false;
        setStatus("Camera ready — tap Capture to transform");
      };

    } catch (err) {
      showOverlay(overlayErr);
      errorMsg.textContent = `Camera error: ${err.message}. Allow camera access and reload.`;
      setStatus("Camera unavailable", false);
    }
  }

  /* ── Capture & transform ── */
  btnCapture.addEventListener("click", async () => {
    /* Grab frame */
    const w = video.videoWidth  || 512;
    const h = video.videoHeight || 682;
    canvas.width  = w;
    canvas.height = h;

    const ctx = canvas.getContext("2d");
    ctx.translate(w, 0);
    ctx.scale(-1, 1); /* un-flip mirror */
    ctx.drawImage(video, 0, 0, w, h);

    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);

    /* UI → loading */
    btnCapture.disabled = true;
    btnCapture.textContent = "Processing…";
    btnReset.style.display = "none";
    promptBadge.style.display = "none";
    showOverlay(overlayLoad);
    loadPrompt.textContent = "Sending to AI model…";
    setStatus("Waiting for Hugging Face…", false);

    try {
      const res = await fetch("/transform", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: dataUrl }),
      });

      const data = await res.json();

      if (!data.success) throw new Error(data.error || "Unknown error");

      /* Show result */
      resultImg.src = data.image;
      resultImg.style.display = "block";
      video.style.display = "none";
      promptText.textContent = data.prompt;
      promptBadge.style.display = "block";

      showOverlay(null);
      btnReset.style.display = "inline-block";
      setStatus("Transformation complete!", false);

    } catch (err) {
      showOverlay(null);
      setStatus(`Error: ${err.message}`, false);
      btnCapture.disabled = false;
      btnCapture.textContent = "Capture";
    }
  });

  /* ── Reset to live mirror ── */
  btnReset.addEventListener("click", () => {
    resultImg.style.display = "none";
    resultImg.src = "";
    promptBadge.style.display = "none";
    video.style.display = "block";
    showOverlay(null);

    btnReset.style.display = "none";
    btnCapture.disabled = false;
    btnCapture.textContent = "Capture";
    setStatus("Camera ready — tap Capture to transform");
  });

  /* ── Boot ── */
  startCamera();
</script>
</body>
</html>
