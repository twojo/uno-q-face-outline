<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Face Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #00ffcc;
            --bg: #0a0a0f;
            --card: #111118;
            --border: #222230;
            --text: #e8e8f0;
            --muted: #666680;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .booth {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
            font-weight: 300;
        }

        .mirror-frame {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4/3;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--border);
            background: #000;
            box-shadow: 0 0 60px rgba(0,255,204,0.05);
            transition: border-color 0.5s ease;
        }

        .mirror-frame video,
        .mirror-frame canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #meshCanvas {
            z-index: 2;
            pointer-events: none;
        }

        .hud-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 5;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.7);
            padding: 10px 14px;
            border-left: 3px solid var(--accent);
            backdrop-filter: blur(6px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, border-color 0.5s;
            border-radius: 0 8px 8px 0;
            min-width: 180px;
        }

        .hud-overlay.visible { opacity: 1; }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .hud-row:last-child { margin-bottom: 0; }

        .hud-label {
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .hud-value {
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            transition: color 0.4s;
        }

        .stats-overlay {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 5;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.7);
            padding: 10px 14px;
            backdrop-filter: blur(6px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 8px 0 0 8px;
            border-right: 3px solid var(--accent);
            min-width: 150px;
        }

        .stats-overlay.visible { opacity: 1; }

        .expression-bar-container {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            z-index: 5;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.7);
            padding: 12px 14px;
            backdrop-filter: blur(6px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .expression-bar-container.visible { opacity: 1; }

        .expression-bar-title {
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .expression-bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            gap: 8px;
        }

        .expression-bar-row:last-child { margin-bottom: 0; }

        .bar-label {
            font-size: 9px;
            color: #aaa;
            width: 80px;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.15s ease-out, background 0.3s;
            width: 0%;
        }

        .bar-val {
            font-size: 10px;
            font-weight: 700;
            width: 36px;
            text-align: right;
            flex-shrink: 0;
            transition: color 0.3s;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 600px;
        }

        .toggle-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .toggle-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .toggle-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,255,204,0.08);
        }

        .toggle-btn:hover {
            border-color: var(--accent);
        }

        .status-text {
            font-size: 14px;
            color: var(--muted);
            font-weight: 300;
            min-height: 20px;
            text-align: center;
        }

        .error-text {
            color: #ff5555;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        @media (max-width: 500px) {
            .header h1 { font-size: 22px; }
            .mirror-frame { max-width: 100%; border-radius: 16px; aspect-ratio: 1; }
        }
    </style>
</head>
<body>
    <div class="booth">
        <div class="header">
            <h1>Face Tracker</h1>
            <p>Real-time Expression Analysis</p>
        </div>

        <div class="mirror-frame" id="mirrorFrame">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="meshCanvas"></canvas>

            <div class="hud-overlay" id="hudOverlay">
                <div class="hud-row">
                    <span class="hud-label">Expression</span>
                    <span id="expressionLabel" class="hud-value">SCANNING...</span>
                </div>
                <div class="hud-row">
                    <span class="hud-label">Confidence</span>
                    <span id="confidence" class="hud-value">--</span>
                </div>
                <div class="hud-row">
                    <span class="hud-label">Faces</span>
                    <span id="faceCount" class="hud-value">0</span>
                </div>
            </div>

            <div class="stats-overlay" id="statsOverlay">
                <div class="hud-row">
                    <span class="hud-label">FPS</span>
                    <span id="fpsValue" class="hud-value">--</span>
                </div>
                <div class="hud-row">
                    <span class="hud-label">Landmarks</span>
                    <span id="landmarkCount" class="hud-value">--</span>
                </div>
                <div class="hud-row">
                    <span class="hud-label">Head Yaw</span>
                    <span id="headYaw" class="hud-value">--</span>
                </div>
                <div class="hud-row">
                    <span class="hud-label">Head Pitch</span>
                    <span id="headPitch" class="hud-value">--</span>
                </div>
            </div>

            <div class="expression-bar-container" id="expressionBars">
                <div class="expression-bar-title">Blendshape Analysis (Primary Face)</div>
                <div class="expression-bar-row">
                    <span class="bar-label">Smile</span>
                    <div class="bar-track"><div class="bar-fill" id="barSmile"></div></div>
                    <span class="bar-val" id="valSmile">0%</span>
                </div>
                <div class="expression-bar-row">
                    <span class="bar-label">Brow Raise</span>
                    <div class="bar-track"><div class="bar-fill" id="barBrowUp"></div></div>
                    <span class="bar-val" id="valBrowUp">0%</span>
                </div>
                <div class="expression-bar-row">
                    <span class="bar-label">Brow Furrow</span>
                    <div class="bar-track"><div class="bar-fill" id="barBrowDown"></div></div>
                    <span class="bar-val" id="valBrowDown">0%</span>
                </div>
                <div class="expression-bar-row">
                    <span class="bar-label">Jaw Open</span>
                    <div class="bar-track"><div class="bar-fill" id="barJaw"></div></div>
                    <span class="bar-val" id="valJaw">0%</span>
                </div>
                <div class="expression-bar-row">
                    <span class="bar-label">Eye Blink</span>
                    <div class="bar-track"><div class="bar-fill" id="barBlink"></div></div>
                    <span class="bar-val" id="valBlink">0%</span>
                </div>
                <div class="expression-bar-row">
                    <span class="bar-label">Pucker</span>
                    <div class="bar-track"><div class="bar-fill" id="barPucker"></div></div>
                    <span class="bar-val" id="valPucker">0%</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="toggle-row">
                <button class="toggle-btn active" data-layer="mesh">Mesh</button>
                <button class="toggle-btn active" data-layer="outline">Outline</button>
                <button class="toggle-btn active" data-layer="eyes">Eyes</button>
                <button class="toggle-btn active" data-layer="brows">Brows</button>
                <button class="toggle-btn active" data-layer="lips">Lips</button>
                <button class="toggle-btn active" data-layer="iris">Iris</button>
                <button class="toggle-btn active" data-layer="dots">Dots</button>
            </div>
            <div class="status-text" id="statusText">Initializing face tracker...</div>
            <div class="error-text" id="errorText"></div>
        </div>
    </div>

<script type="module">
    import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

    const video = document.getElementById("webcam");
    const meshCanvas = document.getElementById("meshCanvas");
    const meshCtx = meshCanvas.getContext("2d");
    const hudOverlay = document.getElementById("hudOverlay");
    const statsOverlay = document.getElementById("statsOverlay");
    const expressionBars = document.getElementById("expressionBars");
    const expressionLabel = document.getElementById("expressionLabel");
    const confidenceEl = document.getElementById("confidence");
    const faceCountEl = document.getElementById("faceCount");
    const fpsValue = document.getElementById("fpsValue");
    const landmarkCount = document.getElementById("landmarkCount");
    const headYaw = document.getElementById("headYaw");
    const headPitch = document.getElementById("headPitch");
    const statusText = document.getElementById("statusText");
    const errorText = document.getElementById("errorText");
    const mirrorFrame = document.getElementById("mirrorFrame");

    const barSmile = document.getElementById("barSmile");
    const barBrowUp = document.getElementById("barBrowUp");
    const barBrowDown = document.getElementById("barBrowDown");
    const barJaw = document.getElementById("barJaw");
    const barBlink = document.getElementById("barBlink");
    const barPucker = document.getElementById("barPucker");
    const valSmile = document.getElementById("valSmile");
    const valBrowUp = document.getElementById("valBrowUp");
    const valBrowDown = document.getElementById("valBrowDown");
    const valJaw = document.getElementById("valJaw");
    const valBlink = document.getElementById("valBlink");
    const valPucker = document.getElementById("valPucker");

    let faceLandmarker = null;
    let drawingUtils = null;
    let meshLoopRunning = false;

    const layers = {
        mesh: true,
        outline: true,
        eyes: true,
        brows: true,
        lips: true,
        iris: true,
        dots: true,
    };

    const EXPRESSION_COLORS = {
        neutral:   { h: 174, s: 100, l: 50, name: "NEUTRAL",   hex: "#00ffcc" },
        happy:     { h: 142, s: 80,  l: 55, name: "HAPPY",     hex: "#2ecc71" },
        surprised: { h: 48,  s: 100, l: 55, name: "SURPRISED", hex: "#f1c40f" },
        angry:     { h: 0,   s: 80,  l: 55, name: "ANGRY",     hex: "#e74c3c" },
        sad:       { h: 220, s: 70,  l: 60, name: "SAD",       hex: "#5b8def" },
        kiss:      { h: 290, s: 70,  l: 60, name: "KISS",      hex: "#c77dff" },
        wink:      { h: 270, s: 80,  l: 65, name: "WINK",      hex: "#a855f7" },
        jawOpen:   { h: 25,  s: 95,  l: 55, name: "JAW OPEN",  hex: "#f59e0b" },
    };

    let currentExpression = EXPRESSION_COLORS.neutral;
    let smoothedExpression = { ...EXPRESSION_COLORS.neutral };
    let expressionConfidence = 0;

    let frameCount = 0;
    let lastFpsTime = performance.now();
    let currentFps = 0;

    document.querySelectorAll(".toggle-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const layer = btn.dataset.layer;
            layers[layer] = !layers[layer];
            btn.classList.toggle("active", layers[layer]);
        });
    });

    function getBlendshapeValue(blendshapes, name) {
        if (!blendshapes || !blendshapes[0] || !blendshapes[0].categories) return 0;
        const cat = blendshapes[0].categories.find(c => c.categoryName === name);
        return cat ? cat.score : 0;
    }

    function detectExpression(blendshapes) {
        const smile = (getBlendshapeValue(blendshapes, "mouthSmileLeft") + getBlendshapeValue(blendshapes, "mouthSmileRight")) / 2;
        const browUp = (getBlendshapeValue(blendshapes, "browInnerUp") + getBlendshapeValue(blendshapes, "browOuterUpLeft") + getBlendshapeValue(blendshapes, "browOuterUpRight")) / 3;
        const browDown = (getBlendshapeValue(blendshapes, "browDownLeft") + getBlendshapeValue(blendshapes, "browDownRight")) / 2;
        const jawOpen = getBlendshapeValue(blendshapes, "jawOpen");
        const blinkL = getBlendshapeValue(blendshapes, "eyeBlinkLeft");
        const blinkR = getBlendshapeValue(blendshapes, "eyeBlinkRight");
        const blink = (blinkL + blinkR) / 2;
        const pucker = getBlendshapeValue(blendshapes, "mouthPucker");
        const mouthFrown = (getBlendshapeValue(blendshapes, "mouthFrownLeft") + getBlendshapeValue(blendshapes, "mouthFrownRight")) / 2;

        let expr = EXPRESSION_COLORS.neutral;
        let conf = 0.3;

        const winkDiff = Math.abs(blinkL - blinkR);
        if (winkDiff > 0.4 && (blinkL > 0.5 || blinkR > 0.5) && blink < 0.7) {
            expr = EXPRESSION_COLORS.wink;
            conf = 0.5 + winkDiff * 0.5;
        } else if (pucker > 0.5) {
            expr = EXPRESSION_COLORS.kiss;
            conf = 0.5 + pucker * 0.5;
        } else if (smile > 0.5 && jawOpen > 0.3) {
            expr = EXPRESSION_COLORS.surprised;
            conf = 0.5 + (smile + jawOpen) * 0.25;
        } else if (smile > 0.35) {
            expr = EXPRESSION_COLORS.happy;
            conf = 0.4 + smile * 0.6;
        } else if (browUp > 0.35 && jawOpen > 0.25) {
            expr = EXPRESSION_COLORS.surprised;
            conf = 0.4 + (browUp + jawOpen) * 0.3;
        } else if (jawOpen > 0.5) {
            expr = EXPRESSION_COLORS.jawOpen;
            conf = 0.5 + jawOpen * 0.5;
        } else if (browDown > 0.35 && mouthFrown > 0.2) {
            expr = EXPRESSION_COLORS.angry;
            conf = 0.4 + (browDown + mouthFrown) * 0.3;
        } else if (mouthFrown > 0.3) {
            expr = EXPRESSION_COLORS.sad;
            conf = 0.4 + mouthFrown * 0.5;
        } else if (browDown > 0.3) {
            expr = EXPRESSION_COLORS.angry;
            conf = 0.3 + browDown * 0.5;
        }

        expressionConfidence = Math.min(conf, 1);

        currentExpression = expr;
        smoothedExpression = lerpColor(smoothedExpression, expr, 0.15);

        updateBar(barSmile, valSmile, smile);
        updateBar(barBrowUp, valBrowUp, browUp);
        updateBar(barBrowDown, valBrowDown, browDown);
        updateBar(barJaw, valJaw, jawOpen);
        updateBar(barBlink, valBlink, blink);
        updateBar(barPucker, valPucker, pucker);

        return expr;
    }

    function updateBar(barEl, valEl, value) {
        const pct = Math.round(value * 100);
        barEl.style.width = pct + "%";
        barEl.style.background = expressionHSL(1);
        valEl.textContent = pct + "%";
        valEl.style.color = expressionHSL(1);
    }

    function lerpColor(a, b, t) {
        return {
            h: a.h + (b.h - a.h) * t,
            s: a.s + (b.s - a.s) * t,
            l: a.l + (b.l - a.l) * t,
        };
    }

    function expressionHSL(alpha) {
        const c = smoothedExpression;
        return `hsla(${Math.round(c.h)}, ${c.s}%, ${c.l}%, ${alpha})`;
    }

    function estimateHeadPose(landmarks) {
        const nose = landmarks[1];
        const leftCheek = landmarks[234];
        const rightCheek = landmarks[454];
        const forehead = landmarks[10];
        const chin = landmarks[152];

        const faceWidth = Math.abs(rightCheek.x - leftCheek.x);
        const faceCenterX = (leftCheek.x + rightCheek.x) / 2;
        const yawOffset = (nose.x - faceCenterX) / (faceWidth || 0.01);
        const yaw = Math.round(yawOffset * 90);

        const faceHeight = Math.abs(chin.y - forehead.y);
        const faceCenterY = (forehead.y + chin.y) / 2;
        const pitchOffset = (nose.y - faceCenterY) / (faceHeight || 0.01);
        const pitch = Math.round(pitchOffset * 90);

        return { yaw, pitch };
    }

    async function initFaceMesh() {
        try {
            statusText.textContent = "Loading face detection model...";
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );

            let options = {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                outputFaceBlendshapes: true,
                runningMode: "VIDEO",
                numFaces: 4
            };

            try {
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, options);
            } catch (gpuErr) {
                console.warn("GPU delegate failed, falling back to CPU:", gpuErr);
                options.baseOptions.delegate = "CPU";
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, options);
            }

            drawingUtils = new DrawingUtils(meshCtx);
            statusText.textContent = "Model loaded. Starting camera...";
            console.log("FaceLandmarker ready with blendshapes");
            return true;
        } catch (err) {
            console.error("MediaPipe init failed:", err);
            statusText.textContent = "";
            errorText.textContent = "Face detection model failed to load. Try refreshing.";
            errorText.style.display = "block";
            return false;
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });
            video.srcObject = stream;
            await new Promise((resolve) => { video.onloadeddata = resolve; });
            statusText.textContent = "";
            startMeshLoop();
        } catch (e) {
            statusText.textContent = "";
            errorText.textContent = "Camera not available. Please allow camera access and refresh.";
            errorText.style.display = "block";
        }
    }

    function startMeshLoop() {
        if (meshLoopRunning) return;
        meshLoopRunning = true;
        requestAnimationFrame(predictWebcam);
    }

    function predictWebcam() {
        if (!meshLoopRunning) return;

        if (!faceLandmarker || !drawingUtils || video.paused || video.ended || video.videoWidth === 0) {
            setTimeout(() => requestAnimationFrame(predictWebcam), 100);
            return;
        }

        meshCanvas.width = video.videoWidth;
        meshCanvas.height = video.videoHeight;

        let results;
        try {
            results = faceLandmarker.detectForVideo(video, performance.now());
        } catch (e) {
            requestAnimationFrame(predictWebcam);
            return;
        }

        meshCtx.clearRect(0, 0, meshCanvas.width, meshCanvas.height);

        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime >= 1000) {
            currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
            frameCount = 0;
            lastFpsTime = now;
            fpsValue.textContent = currentFps;
        }

        const hasFaces = results && results.faceLandmarks && results.faceLandmarks.length > 0;

        if (hasFaces) {
            const numFaces = results.faceLandmarks.length;
            faceCountEl.textContent = numFaces;

            const targetExpr = detectExpression(results.faceBlendshapes);

            expressionLabel.textContent = targetExpr.name;
            expressionLabel.style.color = targetExpr.hex;
            confidenceEl.textContent = Math.round(expressionConfidence * 100) + "%";
            confidenceEl.style.color = expressionHSL(1);

            const primaryLandmarks = results.faceLandmarks[0];
            landmarkCount.textContent = primaryLandmarks.length;

            const pose = estimateHeadPose(primaryLandmarks);
            headYaw.textContent = (pose.yaw > 0 ? "+" : "") + pose.yaw + "°";
            headPitch.textContent = (pose.pitch > 0 ? "+" : "") + pose.pitch + "°";

            mirrorFrame.style.borderColor = expressionHSL(0.6);
            hudOverlay.style.borderLeftColor = expressionHSL(1);
            statsOverlay.style.borderRightColor = expressionHSL(1);

            for (let fi = 0; fi < numFaces; fi++) {
                const landmarks = results.faceLandmarks[fi];
                const w = meshCanvas.width;
                const h = meshCanvas.height;

                if (layers.mesh) {
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_TESSELATION,
                        { color: expressionHSL(0.12), lineWidth: 0.5 });
                }

                if (layers.outline) {
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_FACE_OVAL,
                        { color: expressionHSL(0.9), lineWidth: 2.5 });
                }

                if (layers.eyes) {
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE,
                        { color: expressionHSL(0.95), lineWidth: 1.5 });
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE,
                        { color: expressionHSL(0.95), lineWidth: 1.5 });
                }

                if (layers.brows) {
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYEBROW,
                        { color: expressionHSL(0.8), lineWidth: 2 });
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_EYEBROW,
                        { color: expressionHSL(0.8), lineWidth: 2 });
                }

                if (layers.lips) {
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LIPS,
                        { color: expressionHSL(0.95), lineWidth: 2 });
                }

                if (layers.iris) {
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_IRIS,
                        { color: expressionHSL(1), lineWidth: 2.5 });
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_IRIS,
                        { color: expressionHSL(1), lineWidth: 2.5 });
                }

                if (layers.dots) {
                    meshCtx.save();
                    const dotColor = expressionHSL(0.5);
                    for (let i = 0; i < landmarks.length; i++) {
                        const x = landmarks[i].x * w;
                        const y = landmarks[i].y * h;
                        meshCtx.fillStyle = dotColor;
                        meshCtx.beginPath();
                        meshCtx.arc(x, y, 0.8, 0, Math.PI * 2);
                        meshCtx.fill();
                    }
                    meshCtx.restore();
                }
            }

            hudOverlay.classList.add("visible");
            statsOverlay.classList.add("visible");
            expressionBars.classList.add("visible");
        } else {
            expressionLabel.textContent = "NO FACE";
            expressionLabel.style.color = "#ff5555";
            confidenceEl.textContent = "--";
            faceCountEl.textContent = "0";
            landmarkCount.textContent = "--";
            headYaw.textContent = "--";
            headPitch.textContent = "--";
            hudOverlay.classList.add("visible");
            statsOverlay.classList.remove("visible");
            expressionBars.classList.remove("visible");
            mirrorFrame.style.borderColor = "var(--border)";
        }

        requestAnimationFrame(predictWebcam);
    }

    const modelReady = await initFaceMesh();
    if (modelReady) {
        await startCamera();
    }
</script>
</body>
</html>
