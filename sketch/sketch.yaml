# Arduino CLI sketch project file for the Uno Q MCU (STM32U585).
#
# ArduinoGraphics is listed explicitly because App Lab's import flow
# does not auto-resolve it from the arduino:zephyr platform bundle
# (known issue as of Dec 2025). Arduino_LED_Matrix is part of the
# board core and does not need a separate entry.
#
# Arduino_RouterBridge 0.4.1 is the latest release (April 2026).
# Transitive dependencies use the dependency: prefix per the
# official app-bricks-examples convention (blink, led-matrix-painter,
# mascot-jump-game, etc.).

profiles:
  default:
    fqbn: arduino:zephyr:unoq
    platforms:
      - platform: arduino:zephyr
    libraries:
      - Arduino_RouterBridge (0.4.1)
      - ArduinoGraphics (1.1.4)
      - dependency: Arduino_RPClite (0.2.1)
      - dependency: ArxContainer (0.7.0)
      - dependency: ArxTypeTraits (0.3.2)
      - dependency: DebugLog (0.8.4)
      - dependency: MsgPack (0.4.2)
default_profile: default
